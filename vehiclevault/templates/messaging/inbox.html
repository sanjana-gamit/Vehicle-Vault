{% extends 'base.html' %}
{% load static %}
{% block content %}
<div class="container py-5">
    <div class="glass-card p-4 rounded-4 shadow-lg border-0" style="background: rgba(11, 17, 32, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05) !important;">
        <h2 class="fw-800 text-white mb-4">Secure Communications</h2>
        
        <div class="list-group">
            {% for contact in contacts %}
            <a href="{% url 'cars:chat' contact.user_id %}" class="list-group-item list-group-item-action bg-transparent border-0 text-white mb-2 p-3 rounded-3" style="background: rgba(255,255,255,0.02) !important; border-left: 4px solid var(--accent) !important;">
                <div class="d-flex w-100 justify-content-between align-items-center">
                    <div>
                        <h5 class="mb-1 fw-700">{{ contact.name|default:contact.email }}</h5>
                        <p class="mb-0 smallest text-white-50">Click to resume secure dialogue</p>
                    </div>
                    <span class="badge bg-accent rounded-pill px-3 py-2">Active</span>
                </div>
            </a>
            {% empty %}
            <div class="text-center py-5 text-white-50">
                <i class="fas fa-comments-alt fa-3x mb-3 opacity-20"></i>
                <p>No active secure communications found.</p>
            </div>
            {% endfor %}
        </div>
    </div>
</div>
{% endblock %}

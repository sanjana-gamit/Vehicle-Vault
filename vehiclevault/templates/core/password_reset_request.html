{% extends 'base.html' %}
{% load static %}

{% block title %}Identity Recovery | Vehicle Vault{% endblock %}

{% block content %}
<style>
    .recovery-page {
        min-height: 90vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
        background: url('{% static "images/bg2.jpg" %}') no-repeat center center fixed;
        background-size: cover;
        position: relative;
    }

    .recovery-page::before {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(circle at 50% 50%, rgba(5, 8, 22, 0.4), rgba(5, 8, 22, 0.9));
        z-index: 1;
    }

    .recovery-card {
        position: relative;
        z-index: 2;
        background: var(--bg-card);
        backdrop-filter: blur(15px);
        border: 1px solid var(--glass-border);
        border-radius: 24px;
        padding: 60px 50px;
        width: 100%;
        max-width: 500px;
        box-shadow: var(--shadow-lg);
        text-align: center;
        overflow: hidden;
    }

    .recovery-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 5px;
        background: linear-gradient(to right, var(--accent), var(--primary));
    }

    .recovery-header {
        margin-bottom: 40px;
    }

    .recovery-icon {
        width: 70px;
        height: 70px;
        background: rgba(56, 189, 248, 0.1);
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 20px;
        color: var(--accent);
        font-size: 2rem;
    }

    .recovery-header h2 {
        font-size: 2.2rem;
        font-weight: 800;
        color: #fff;
        margin-bottom: 12px;
        letter-spacing: -0.5px;
    }

    .recovery-header p {
        color: var(--text-muted);
        font-size: 1rem;
        line-height: 1.6;
    }

    .form-group {
        text-align: left;
        margin-bottom: 25px;
    }

    .form-label {
        display: block;
        font-weight: 600;
        color: #e2e8f0;
        margin-bottom: 10px;
        font-size: 0.9rem;
        letter-spacing: 0.5px;
    }

    .form-control {
        width: 100%;
        padding: 14px 20px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--glass-border);
        border-radius: 12px;
        color: #fff;
        font-family: inherit;
        transition: var(--transition);
    }

    .form-control:focus {
        background: rgba(255, 255, 255, 0.08);
        border-color: var(--accent);
        box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.15);
        outline: none;
    }

    .btn-recovery {
        width: 100%;
        padding: 16px;
        background: linear-gradient(135deg, var(--accent), var(--primary));
        color: var(--bg-dark);
        border: none;
        border-radius: 14px;
        font-weight: 800;
        font-size: 1.1rem;
        letter-spacing: 1px;
        text-transform: uppercase;
        transition: var(--transition);
        margin-top: 10px;
        cursor: pointer;
    }

    .btn-recovery:hover {
        transform: translateY(-3px);
        box-shadow: 0 12px 30px rgba(56, 189, 248, 0.3);
        filter: brightness(1.1);
    }

    .footer-links {
        margin-top: 35px;
        padding-top: 25px;
        border-top: 1px solid var(--glass-border);
    }

    .back-link {
        color: var(--text-muted);
        text-decoration: none;
        font-weight: 600;
        font-size: 0.95rem;
        transition: var(--transition);
    }

    .back-link:hover {
        color: var(--accent);
    }

    .back-link i {
        margin-right: 8px;
    }
</style>

<div class="recovery-page">
    <div class="recovery-card animate__animated animate__fadeIn">
        <div class="recovery-header">
            <div class="recovery-icon">
                <i class="fas fa-shield-alt"></i>
            </div>
            <h2>Vault Recovery</h2>
            <p>Initiate a secure session reset by entering your executive identity.</p>
        </div>

        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label">Authorized Email Address</label>
                <input type="email" name="email" class="form-control" placeholder="executive@vehiclevault.com" required>
            </div>

            <button type="submit" class="btn-recovery">Transmit Reset Code</button>
        </form>

        <div class="footer-links">
            <a href="{% url 'core:login' %}" class="back-link">
                <i class="fas fa-arrow-left"></i> Return to Secure Portal
            </a>
        </div>
    </div>
</div>
{% endblock %}

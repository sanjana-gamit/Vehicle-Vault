{% extends 'base.html' %}
{% load static %}

{% block title %}Verify Identity | Vehicle Vault{% endblock %}

{% block content %}
<style>
    .recovery-page {
        min-height: 90vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
        background: url('{% static "images/bg2.jpg" %}') no-repeat center center fixed;
        background-size: cover;
        position: relative;
    }

    .recovery-page::before {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(circle at 50% 50%, rgba(5, 8, 22, 0.4), rgba(5, 8, 22, 0.9));
        z-index: 1;
    }

    .recovery-card {
        position: relative;
        z-index: 2;
        background: var(--bg-card);
        backdrop-filter: blur(15px);
        border: 1px solid var(--glass-border);
        border-radius: 24px;
        padding: 50px 45px;
        width: 100%;
        max-width: 500px;
        box-shadow: var(--shadow-lg);
        text-align: center;
        overflow: hidden;
    }

    .recovery-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 5px;
        background: linear-gradient(to right, var(--accent), var(--primary));
    }

    .recovery-header {
        margin-bottom: 35px;
    }

    .recovery-icon {
        width: 70px;
        height: 70px;
        background: rgba(56, 189, 248, 0.1);
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 20px;
        color: var(--accent);
        font-size: 2rem;
    }

    .recovery-header h2 {
        font-size: 2rem;
        font-weight: 800;
        color: #fff;
        margin-bottom: 12px;
        letter-spacing: -0.5px;
    }

    .recovery-header p {
        color: var(--text-muted);
        font-size: 0.95rem;
        line-height: 1.6;
    }

    .form-group {
        text-align: left;
        margin-bottom: 22px;
    }

    .form-label {
        display: block;
        font-weight: 600;
        color: #e2e8f0;
        margin-bottom: 10px;
        font-size: 0.85rem;
        letter-spacing: 0.5px;
        text-transform: uppercase;
    }

    .form-control {
        width: 100%;
        padding: 12px 18px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--glass-border);
        border-radius: 12px;
        color: #fff;
        font-family: inherit;
        transition: var(--transition);
    }

    .form-control:focus {
        background: rgba(255, 255, 255, 0.08);
        border-color: var(--accent);
        box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.15);
        outline: none;
    }

    .otp-input {
        letter-spacing: 4px;
        font-weight: 800;
        font-size: 1.2rem;
        text-align: center;
        color: var(--accent);
    }

    .btn-recovery {
        width: 100%;
        padding: 16px;
        background: linear-gradient(135deg, var(--accent), var(--primary));
        color: var(--bg-dark);
        border: none;
        border-radius: 14px;
        font-weight: 800;
        font-size: 1.1rem;
        letter-spacing: 1px;
        text-transform: uppercase;
        transition: var(--transition);
        margin-top: 10px;
        cursor: pointer;
    }

    .btn-recovery:hover {
        transform: translateY(-3px);
        box-shadow: 0 12px 30px rgba(56, 189, 248, 0.3);
        filter: brightness(1.1);
    }

</style>

<div class="recovery-page">
    <div class="recovery-card animate__animated animate__fadeIn">
        <div class="recovery-header">
            <div class="recovery-icon">
                <i class="fas fa-key"></i>
            </div>
            <h2>Verify Identity</h2>
            <p>Enter the security code transmitted to your email and set your new vault credentials.</p>
        </div>

        <form method="POST">
            {% csrf_token %}
            
            <div class="form-group">
                <label class="form-label">Authorized Email</label>
                <input type="email" name="email" value="{{ email }}" class="form-control" placeholder="executive@vehiclevault.com" required>
            </div>

            <div class="form-group">
                <label class="form-label">Security Code (OTP)</label>
                <input type="text" name="otp" class="form-control otp-input" maxlength="6" placeholder="000000" required>
            </div>

            <div class="form-group">
                <label class="form-label">New Master Password</label>
                <input type="password" name="new_password" class="form-control" placeholder="••••••••" required>
            </div>

            <div class="form-group">
                <label class="form-label">Confirm New Password</label>
                <input type="password" name="confirm_password" class="form-control" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-recovery">Finalize Reset</button>
        </form>
    </div>
</div>
{% endblock %}
